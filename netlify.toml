# Root-level netlify.toml
# Each project (job-tracker, marketing-site) has its own netlify.toml
# Base directory must be configured in Netlify dashboard for each site

# This file intentionally minimal - configuration is in:
# - job-tracker/netlify.toml
# - marketing-site/netlify.toml

[build]
  command = "npm run build"
  publish = "out"

[build.environment]
  NODE_VERSION = "20"

# Fallback for unknown routes (Next.js static export)
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
